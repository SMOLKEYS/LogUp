logup = LogUP
formatting = Formatting
finalOutput = Final Output
enableAnsi = Enable ANSI Terminal Colors ([lightgray]Requires a supported terminal[])
ent.level = %level% - Log level, usually the first three characters in a log entry
ent.time = %time% - The time this log was written
ent.loggy = %loggy% - The header of the log
ent.content = %content% - The log contents
ent.class = %class% - The class that made the log call
ent.qualifiedclass = %qualifiedclass% - Like above, but with the fully qualified class name (package.Class)
ent.file = %file% - The origin source file
ent.method = %method% - The method that made the log call
ent.line = %line% - The exact line that made the log call